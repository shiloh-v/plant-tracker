<title>Shiloh's Garden</title>

<style>
  :root {
    --green: #2d5a27;
    --cream: #fffdf8;
    --bg: #f4f0e8;
    --border: #e0d8cc;
    --muted: #7a7060;
    --warn-bg: #fef3c7; --warn-fg: #b45309;
    --danger-bg: #fee2e2; --danger-fg: #b91c1c;
    --good-bg: #dcfce7; --good-fg: #15803d;
    --info-bg: #dbeafe; --info-fg: #1d4ed8;
    --purple-bg: #ede9fe; --purple-fg: #6d28d9;
    --sky-bg: #e0f2fe; --sky-fg: #0369a1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: #1e1a12; overscroll-behavior: none; }

  /* ── Header ── */
  #header { background: var(--green); color: white; padding: 16px 14px 12px; position: sticky; top: 0; z-index: 30; box-shadow: 0 2px 12px rgba(0,0,0,.22); }
  .header-inner { max-width: 860px; margin: 0 auto; }
  .header-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .header-top h1 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
  #photo-count { font-size: 11px; opacity: .7; }
  #search { width: 100%; padding: 8px 14px; border-radius: 20px; border: none; background: rgba(255,255,255,.18); color: white; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 10px; }
  #search::placeholder { color: rgba(255,255,255,.55); }
  #tabs { display: flex; gap: 6px; }
  .tab { padding: 4px 14px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit; background: transparent; color: rgba(255,255,255,.8); transition: all .12s; }
  .tab.active { background: var(--cream); color: var(--green); }

  /* ── Loc pills ── */
  #loc-bar { padding: 10px 12px 0; max-width: 860px; margin: 0 auto; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
  #loc-bar::-webkit-scrollbar { display: none; }
  .loc-pill { display: inline-block; margin-right: 6px; padding: 4px 12px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--cream); color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; transition: all .12s; font-family: inherit; white-space: nowrap; }
  .loc-pill.active { background: var(--green); color: white; border-color: var(--green); }

  /* ── Grid ── */
  #grid-wrap { max-width: 860px; margin: 0 auto; padding: 10px 12px 100px; }
  #count-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }

  /* ── Cards ── */
  .card { background: var(--cream); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.05); cursor: pointer; transition: transform .12s, box-shadow .12s; -webkit-user-select: none; }
  .card:active { transform: scale(.97); }
  .card-photo { height: 120px; background: #e8e2d5; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; }
  .card-photo .placeholder { font-size: 30px; opacity: .45; }
  .card-photo .add-hint { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,.35); color: white; font-size: 9px; padding: 2px 5px; border-radius: 5px; font-family: inherit; }
  .toxic-badge { position: absolute; top: 5px; right: 5px; background: var(--danger-bg); color: var(--danger-fg); font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 6px; }
  .card-body { padding: 9px 9px 8px; }
  .card-name { font-family: 'Fraunces', serif; font-size: 12.5px; font-weight: 700; line-height: 1.25; margin-bottom: 2px; }
  .card-sub { font-size: 10px; color: var(--muted); margin-bottom: 2px; line-height: 1.2; }
  .card-loc { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .status-pill { font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 8px; display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-updated { font-size: 9px; color: #aaa; margin-top: 3px; }

  /* ── Overlay + Modal ── */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  #overlay.hidden { display: none; }
  #modal { background: var(--cream); width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; border-radius: 18px 18px 0 0; padding: 0 18px 60px; -webkit-overflow-scrolling: touch; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 8px; }
  .modal-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .modal-name { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 700; line-height: 1.15; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .modal-sci { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 1px; }
  #close-btn { background: #f0ebe0; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 10px; font-family: inherit; }

  /* Photo area */
  #photo-wrap { height: 240px; background: #e8e2d5; border-radius: 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; margin-bottom: 14px; }
  #photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  #photo-wrap .no-photo { text-align: center; color: var(--muted); }
  #photo-wrap .no-photo span { font-size: 52px; display: block; }
  #photo-wrap .no-photo p { font-size: 13px; margin-top: 6px; font-weight: 600; }
  #photo-btn { position: absolute; bottom: 10px; right: 10px; background: var(--green); color: white; border: none; border-radius: 20px; padding: 7px 15px; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.25); font-family: inherit; }

  /* Meta grid */
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .meta-cell { background: #f0ebe0; border-radius: 10px; padding: 8px 10px; }
  .meta-label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
  .meta-val { font-size: 12px; line-height: 1.3; }

  /* Toxic warning */
  .toxic-warn { background: var(--danger-bg); border: 1px solid #fca5a5; border-radius: 10px; padding: 9px 12px; margin-bottom: 12px; font-size: 12px; color: var(--danger-fg); font-weight: 700; }

  /* Status / Notes */
  .field-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .field-wrap { margin-bottom: 12px; }
  .status-display { padding: 9px 12px; border-radius: 10px; font-size: 13px; font-weight: 600; line-height: 1.4; }
  .notes-display { padding: 9px 12px; background: #f0ebe0; border-radius: 10px; font-size: 13px; min-height: 48px; line-height: 1.5; color: var(--muted); }
  .notes-display.has-notes { color: #1e1a12; }
  textarea { width: 100%; padding: 9px 11px; border-radius: 10px; border: 1.5px solid var(--green); font-size: 13px; outline: none; resize: vertical; font-family: inherit; background: white; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .btn { flex: 1; padding: 11px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; }
  .btn-outline { background: white; border: 1.5px solid var(--border) !important; color: #1e1a12; }
  .btn-primary { background: var(--green); color: white; }
  .btn-edit { width: 100%; padding: 11px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; background: white; border: 1.5px solid var(--green); color: var(--green); }
  .modal-updated { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

  /* Loading */
  #loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  /* Spinner */
  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <div class="header-inner">
    <div class="header-top">
      <h1>🌿 Shiloh's Garden</h1>
      <span id="photo-count"></span>
    </div>
    <input type="search" id="search" placeholder="Search by name, genus, or area…" autocomplete="off">
    <div id="tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="indoor">Indoor</button>
      <button class="tab" data-tab="outdoor">Outdoor</button>
    </div>
  </div>
</div>

<!-- ── Location pills ── -->
<div id="loc-bar"></div>

<!-- ── Main grid ── -->
<div id="grid-wrap">
  <div id="count-label"></div>
  <div id="loading">Loading your garden…</div>
  <div id="grid"></div>
</div>

<!-- ── Detail modal ── -->
<div id="overlay" class="hidden">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title-row">
      <div id="modal-title-block"></div>
      <button id="close-btn">×</button>
    </div>
    <div id="photo-wrap">
      <div class="no-photo"><span>🌱</span><p>Tap to add photo</p></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:0">
      <button id="photo-btn" style="flex:2;padding:7px 15px;background:var(--green);color:white;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.25)">📷 Add photo</button>
      <button id="download-btn" style="flex:1;padding:7px 15px;background:#f0ebe0;color:var(--muted);border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:none">⬇ Save</button>
    </div>
    <div class="meta-grid" id="meta-grid"></div>
    <div id="toxic-warn" class="toxic-warn" style="display:none">☠ TOXIC TO DOGS — keep in dog-free area at all times</div>
    <div class="field-wrap">
      <div class="field-label">Current Status</div>
      <div id="status-display" class="status-display"></div>
      <textarea id="status-edit" rows="2" style="display:none"></textarea>
    </div>
    <div class="field-wrap">
      <div class="field-label">Notes</div>
      <div id="notes-display" class="notes-display">No notes yet — tap Edit to add.</div>
      <textarea id="notes-edit" rows="4" placeholder="Add your notes…" style="display:none"></textarea>
    </div>
    <div class="btn-row" id="save-row" style="display:none">
      <button class="btn btn-outline" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Save changes</button>
    </div>
    <button class="btn-edit" id="edit-btn">✏️ Edit status &amp; notes</button>
    <div class="modal-updated" id="modal-updated"></div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">

// ── State ───────────────────────────────────────────────────────────────────
let overrides = {};   // id -> {status, notes, photo_ts, updated_at}
let photoURLs = {};   // id -> public URL string (with cache-bust)
let selectedId = null;
let tab = 'all';
let locFilter = 'all';
let editMode = false;

// ── Status theming ──────────────────────────────────────────────────────────
function statusTheme(s) {
  if (!s) return {color:'#6b7280',bg:'#f3f4f6'};
  const l = s.toLowerCase();
  if (l.includes('☠') || l.includes('toxic'))    return {color:'var(--danger-fg)',bg:'var(--danger-bg)'};
  if (l.includes('⚠') || l.includes('urgent') || l.includes('emergency') || l.includes('recover') || l.includes('await') || l.includes('stress'))
    return {color:'var(--warn-fg)',bg:'var(--warn-bg)'};
  if (l.includes('⭐') || l.includes('full bloom') || l.includes('blooming'))
    return {color:'var(--sky-fg)',bg:'var(--sky-bg)'};
  if (l.includes('harvest') || l.includes('watch for flower') || l.includes('filling'))
    return {color:'var(--good-fg)',bg:'var(--good-bg)'};
  if (l.includes('newly') || l.includes('establishing') || l.includes('germinating') || l.includes('sown') || l.includes('transplanted'))
    return {color:'var(--purple-fg)',bg:'var(--purple-bg)'};
  if (l.includes('healthy') || l.includes('established'))
    return {color:'var(--good-fg)',bg:'var(--good-bg)'};
  return {color:'#6b7280',bg:'#f3f4f6'};
}

// ── Photo URL helper ────────────────────────────────────────────────────────
function photoURL(id, ts) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${id}.jpg${ts ? '?t='+ts : ''}`;
}

// ── Image compression ───────────────────────────────────────────────────────
function compress(file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1000;
        let w = img.width, h = img.height;
        if (w > h && w > MAX)      { h = h * MAX / w; w = MAX; }
        else if (h > w && h > MAX) { w = w * MAX / h; h = MAX; }
        else if (w > MAX)          { h = h * MAX / w; w = MAX; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        c.toBlob(blob => res(blob), 'image/jpeg', 0.78);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Load data from Supabase ─────────────────────────────────────────────────
async function loadData() {
  const { data } = await sb.from('plant_overrides').select('*');
  overrides = {};
  photoURLs = {};
  if (data) {
    data.forEach(row => {
      overrides[row.id] = row;
      if (row.photo_ts) photoURLs[row.id] = photoURL(row.id, row.photo_ts);
    });
  }
  document.getElementById('loading').style.display = 'none';
  renderGrid();
  updatePhotoCount();
}

// ── Render helpers ──────────────────────────────────────────────────────────
function getStatus(plant) { return overrides[plant.id]?.status || plant.status; }

function updatePhotoCount() {
  const n = Object.values(overrides).filter(r => r.photo_ts).length;
  document.getElementById('photo-count').textContent = `${n}/${PLANTS.length} photos`;
}

function getFilteredPlants() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  return PLANTS.filter(p => {
    if (tab !== 'all' && p.type !== tab) return false;
    if (locFilter !== 'all' && p.loc !== locFilter) return false;
    if (q) return p.name.toLowerCase().includes(q) || p.sci.toLowerCase().includes(q) || (p.sub||'').toLowerCase().includes(q) || p.loc.toLowerCase().includes(q);
    return true;
  });
}

function renderLocPills() {
  const locs = ['all', ...new Set(PLANTS.filter(p => tab === 'all' || p.type === tab).map(p => p.loc))];
  const bar = document.getElementById('loc-bar');
  const q = document.getElementById('search').value.trim();
  if (q) { bar.innerHTML = ''; return; }
  bar.innerHTML = locs.map(loc =>
    `<button class="loc-pill${locFilter === loc ? ' active' : ''}" data-loc="${loc}">${loc === 'all' ? 'All Areas' : loc}</button>`
  ).join('');
}

function renderGrid() {
  renderLocPills();
  const plants = getFilteredPlants();
  document.getElementById('count-label').textContent = `${plants.length} plant${plants.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('grid');
  grid.innerHTML = plants.map(p => {
    const url = photoURLs[p.id];
    const st = getStatus(p);
    const { color, bg } = statusTheme(st);
    const ov = overrides[p.id];
    return `
      <div class="card" data-id="${p.id}">
        <div class="card-photo">
          ${url ? `<img src="${url}" alt="${p.name}" loading="lazy">` : '<span class="placeholder">🌱</span>'}
          ${p.toxic ? '<span class="toxic-badge">☠ TOXIC</span>' : ''}
          ${!url ? '<span class="add-hint">+ photo</span>' : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          ${p.sub ? `<div class="card-sub">${p.sub}</div>` : ''}
          <div class="card-loc">${p.loc}</div>
          <span class="status-pill" style="color:${color};background:${bg}">${st.replace(/[☠⚠⭐]/g,'').trim().slice(0,38)}${st.length>38?'…':''}</span>
          ${ov?.updated_at ? `<div class="card-updated">Updated ${new Date(ov.updated_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── Modal ───────────────────────────────────────────────────────────────────
function openModal(id) {
  selectedId = id;
  const p = PLANTS.find(x => x.id === id);
  const ov = overrides[id];
  editMode = false;

  document.getElementById('modal-title-block').innerHTML = `
    <div class="modal-name">${p.name}</div>
    ${p.sub ? `<div class="modal-sub">${p.sub}</div>` : ''}
    ${p.sci ? `<div class="modal-sci">${p.sci}</div>` : ''}`;

  // Photo
  const photoWrap = document.getElementById('photo-wrap');
  const url = photoURLs[id];
  photoWrap.innerHTML = url
    ? `<img src="${url}" alt="${p.name}">`
    : `<div class="no-photo"><span>🌱</span><p>Tap to add photo</p></div>`;
  document.getElementById('photo-btn').textContent = url ? '📷 Update photo' : '📷 Add photo';
  const dlBtn = document.getElementById('download-btn');
  dlBtn.style.display = url ? 'block' : 'none';
  dlBtn.onclick = () => downloadPhoto(id);

  // Meta
  document.getElementById('meta-grid').innerHTML = `
    <div class="meta-cell"><div class="meta-label">Container</div><div class="meta-val">${p.pot}</div></div>
    <div class="meta-cell"><div class="meta-label">Location</div><div class="meta-val">${p.loc}</div></div>`;

  document.getElementById('toxic-warn').style.display = p.toxic ? 'block' : 'none';

  // Status & notes
  const st = getStatus(p);
  const { color, bg } = statusTheme(st);
  const statusDisplay = document.getElementById('status-display');
  statusDisplay.textContent = st;
  statusDisplay.style.color = color;
  statusDisplay.style.background = bg;

  const notesDisplay = document.getElementById('notes-display');
  notesDisplay.textContent = ov?.notes || 'No notes yet — tap Edit to add.';
  notesDisplay.className = 'notes-display' + (ov?.notes ? ' has-notes' : '');

  document.getElementById('status-edit').value = st;
  document.getElementById('notes-edit').value = ov?.notes || '';

  setEditMode(false);

  const updated = ov?.updated_at
    ? `Last updated ${new Date(ov.updated_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`
    : '';
  document.getElementById('modal-updated').textContent = updated;

  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  document.body.style.overflow = '';
  selectedId = null;
}

function setEditMode(on) {
  editMode = on;
  document.getElementById('status-display').style.display = on ? 'none' : 'block';
  document.getElementById('status-edit').style.display = on ? 'block' : 'none';
  document.getElementById('notes-display').style.display = on ? 'none' : 'block';
  document.getElementById('notes-edit').style.display = on ? 'block' : 'none';
  document.getElementById('save-row').style.display = on ? 'flex' : 'none';
  document.getElementById('edit-btn').style.display = on ? 'none' : 'block';
}

async function saveOverride() {
  if (!selectedId) return;
  const btn = document.getElementById('save-btn');
  btn.innerHTML = '<span class="spin"></span> Saving…';
  btn.disabled = true;

  const status = document.getElementById('status-edit').value.trim();
  const notes = document.getElementById('notes-edit').value.trim();
  const existing = overrides[selectedId] || {};
  const row = { id: selectedId, status, notes, photo_ts: existing.photo_ts || null, updated_at: new Date().toISOString() };

  const { error } = await sb.from('plant_overrides').upsert(row);
  if (!error) {
    overrides[selectedId] = row;
    // Refresh display
    const { color, bg } = statusTheme(status);
    const statusDisplay = document.getElementById('status-display');
    statusDisplay.textContent = status;
    statusDisplay.style.color = color;
    statusDisplay.style.background = bg;
    const notesDisplay = document.getElementById('notes-display');
    notesDisplay.textContent = notes || 'No notes yet — tap Edit to add.';
    notesDisplay.className = 'notes-display' + (notes ? ' has-notes' : '');
    document.getElementById('modal-updated').textContent = `Last updated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`;
    setEditMode(false);
    renderGrid();
  }
  btn.innerHTML = 'Save changes';
  btn.disabled = false;
}

// ── Photo upload ─────────────────────────────────────────────────────────────
async function uploadPhoto(file) {
  if (!selectedId || !file) return;
  const btn = document.getElementById('photo-btn');
  btn.innerHTML = '<span class="spin"></span> Uploading…';
  btn.disabled = true;

  const blob = await compress(file);
  const path = `${selectedId}.jpg`;
  const { error } = await sb.storage.from(BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });

  if (!error) {
    const ts = Date.now();
    const url = photoURL(selectedId, ts);
    photoURLs[selectedId] = url;

    // Save timestamp to DB
    const existing = overrides[selectedId] || { id: selectedId };
    const row = { ...existing, photo_ts: ts, updated_at: new Date().toISOString() };
    await sb.from('plant_overrides').upsert(row);
    overrides[selectedId] = row;

    // Refresh photo in modal
    document.getElementById('photo-wrap').innerHTML = `<img src="${url}" alt="">`;
    btn.textContent = '📷 Update photo';
    const dlBtn = document.getElementById('download-btn');
    dlBtn.style.display = 'block';
    dlBtn.onclick = () => downloadPhoto(selectedId);
    updatePhotoCount();
    renderGrid();
  } else {
    alert('Upload failed: ' + error.message);
    btn.textContent = '📷 Add photo';
  }
  btn.disabled = false;
}

// ── Photo download ───────────────────────────────────────────────────────────
async function downloadPhoto(id) {
  const url = photoURLs[id];
  if (!url) return;
  const p = PLANTS.find(x => x.id === id);
  const btn = document.getElementById('download-btn');
  btn.textContent = '…';
  btn.disabled = true;
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${p.name.replace(/[^a-z0-9]/gi,'_')}.jpg`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch { alert('Download failed — try again.'); }
  btn.textContent = '⬇ Save';
  btn.disabled = false;
}

// ── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', () => {
  locFilter = 'all';
  renderGrid();
});

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  tab = btn.dataset.tab;
  locFilter = 'all';
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
  renderGrid();
});

document.getElementById('loc-bar').addEventListener('click', e => {
  const btn = e.target.closest('.loc-pill');
  if (!btn) return;
  locFilter = btn.dataset.loc;
  renderGrid();
});

document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card) openModal(card.dataset.id);
});

document.getElementById('close-btn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

document.getElementById('photo-wrap').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('photo-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) uploadPhoto(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('edit-btn').addEventListener('click', () => setEditMode(true));
document.getElementById('cancel-btn').addEventListener('click', () => setEditMode(false));
document.getElementById('save-btn').addEventListener('click', saveOverride);

// Swipe down to close modal
let touchStartY = 0;
document.getElementById('modal').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('modal').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 80 && document.getElementById('modal').scrollTop === 0) closeModal();
}, {passive:true});

// ── Boot ────────────────────────────────────────────────────────────────────
loadData();
</script>
